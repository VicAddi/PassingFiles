<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ecosistema RR-8 — Diagrama Animado</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #F7F5F2;
    font-family: 'IBM Plex Sans', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    color: #1C1B18;
  }
  header {
    padding: 16px 32px 12px;
    border-bottom: 1px solid #D9D5CE;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .hd-left h1 {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: #1C1B18;
  }
  .hd-left .eyebrow {
    font-size: 11px;
    font-weight: 400;
    color: #9B9690;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 2px;
  }
  #phaseLabel {
    font-size: 13px;
    color: #4A4840;
    margin-top: 3px;
    min-height: 18px;
    transition: opacity 0.3s;
    max-width: 580px;
  }
  .controls {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .btn {
    padding: 7px 16px;
    border: 1px solid #D9D5CE;
    background: white;
    border-radius: 3px;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    color: #1C1B18;
    transition: background 0.12s;
    user-select: none;
  }
  .btn:hover { background: #EEECEA; }
  .btn:disabled { opacity: 0.35; cursor: default; }
  .btn.primary {
    background: #1B4F8A;
    color: white;
    border-color: #1B4F8A;
  }
  .btn.primary:hover { background: #153e6e; }
  .phase-pill {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: #6B6860;
    padding: 4px 10px;
    background: #EEECEA;
    border-radius: 20px;
    min-width: 52px;
    text-align: center;
  }
  .legend {
    display: flex;
    gap: 14px;
    align-items: center;
    flex-wrap: wrap;
    margin-top: 6px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 10.5px;
    color: #6B6860;
  }
  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 2px;
  }
  .svg-wrap {
    flex: 1;
    overflow: hidden;
    position: relative;
    background: #F7F5F2;
  }
  #diagram { width: 100%; height: 100%; display: block; overflow: visible; }

  /* ── Node base ── */
  .node { transition: opacity 0.55s ease, transform 0.55s ease; transform-origin: center; }
  .node.hidden { opacity: 0; transform: scale(0.85); pointer-events: none; }

  /* ── Edge base ── */
  .edge { transition: opacity 0.45s ease; }
  .edge.hidden { opacity: 0; }

  /* ── Label phase ── */
  .phase-tag { transition: opacity 0.4s ease; }
  .phase-tag.hidden { opacity: 0; }

  /* progress bar */
  #progressBar {
    height: 2px;
    background: #1B4F8A;
    width: 0%;
    transition: width 0.4s ease;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<header>
  <div class="hd-left">
    <div class="eyebrow">Reporte Regulatorio 8</div>
    <h1>Ecosistema RR-8 — Marco regulatorio y flujo de información</h1>
    <div id="phaseLabel">Iniciando…</div>
  </div>
  <div class="controls">
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#EEF3FA;border:1.5px solid #1B4F8A"></div>Regulador</div>
      <div class="legend-item"><div class="legend-dot" style="background:#FBF0E0;border:1.5px solid #C07B2A"></div>Marco legal</div>
      <div class="legend-item"><div class="legend-dot" style="background:#E8F2EC;border:1.5px solid #2A7A4A"></div>Aseguradora</div>
      <div class="legend-item"><div class="legend-dot" style="background:#1B4F8A"></div>RR-8</div>
      <div class="legend-item"><div class="legend-dot" style="background:#F0EBF8;border:1.5px solid #6B42A0"></div>Sistema / TI</div>
      <div class="legend-item"><div class="legend-dot" style="background:#E8EFF8;border:1.5px solid #2D6CB5"></div>SESA / FES</div>
      <div class="legend-item"><div class="legend-dot" style="background:#FBF5E0;border:1.5px solid #A07028"></div>Outputs</div>
    </div>
    <button class="btn" id="btnPrev" onclick="prevPhase()">← Anterior</button>
    <span class="phase-pill" id="phasePill">0 / 11</span>
    <button class="btn" id="btnNext" onclick="nextPhase()">Siguiente →</button>
    <button class="btn primary" id="btnPlay" onclick="togglePlay()">▶ Auto</button>
  </div>
</header>
<div id="progressBar"></div>

<div class="svg-wrap">
<svg id="diagram" viewBox="0 0 1440 680" preserveAspectRatio="xMidYMid meet"><g id="dc">

<script>
const TOTAL = 11;
let phase = 0;
let playing = false;
let timer = null;

const LABELS = [
  "La autoridad reguladora: la CNSF supervisa, controla y vigila al sector asegurador mexicano.",
  "La LISF (Ley de Instituciones de Seguros y Fianzas) establece la obligación legal de reportar a la CNSF.",
  "La CUSF (Circular Única de Seguros y Fianzas), Disposición 38.1.9 y sus Anexos a–z, define el contenido exacto del RR-8.",
  "AXA, como institución aseguradora autorizada, está obligada a presentar el RR-8 según los ramos en que opera.",
  "Los insumos primarios: primas emitidas (suscripción/emisión), siniestros (pagados y pendientes) y contratos de reaseguro.",
  "Con esos datos se consolida el RR-8: un conjunto de archivos .TXT, uno por cada Sistema Estadístico (SESA) o ramo.",
  "Los archivos se comprimen en ZIP y se cifran con PGP antes de enviarse vía SEIVE — el portal de entrega electrónica de la CNSF.",
  "El SEIVE entrega el reporte a la CNSF, que valida formato, catálogos y lo registra en el expediente regulatorio.",
  "La CNSF distribuye la información en Sistemas Estadísticos por ramo (SESA) y en las Formas Estadísticas de Seguros (FES).",
  "Los datos alimentan a la AMIS (estudios técnicos y tarifas), datos.gob.mx (datos abiertos) y el Anuario Estadístico CNSF.",
  "El RR-8 se concilia cruzadamente con RR-1 (corporativo), RR-3 (reservas) y RR-7 (estados financieros) para consistencia.",
];

function update() {
  document.querySelectorAll('.node[data-phase], .edge[data-phase]').forEach(el => {
    const p = parseInt(el.dataset.phase);
    el.classList.toggle('hidden', p > phase);
  });
  document.getElementById('phaseLabel').textContent = phase > 0 ? LABELS[phase - 1] : '—';
  document.getElementById('phasePill').textContent = phase + ' / ' + TOTAL;
  document.getElementById('btnPrev').disabled = phase <= 1;
  document.getElementById('btnNext').disabled = phase >= TOTAL;
  document.getElementById('progressBar').style.width = (phase / TOTAL * 100) + '%';
  const bg = document.getElementById('phaseBg');
  if (bg) bg.textContent = String(phase).padStart(2, '0');
}

function nextPhase() {
  if (phase < TOTAL) { phase++; update(); }
  else if (playing) stopPlay();
}

function prevPhase() {
  if (phase > 1) { phase--; update(); }
}

function startPlay() {
  playing = true;
  document.getElementById('btnPlay').textContent = '⏸ Pausar';
  timer = setInterval(() => {
    if (phase >= TOTAL) { stopPlay(); return; }
    nextPhase();
  }, 2600);
}

function stopPlay() {
  playing = false;
  clearInterval(timer);
  document.getElementById('btnPlay').textContent = '▶ Auto';
}

function togglePlay() {
  playing ? stopPlay() : startPlay();
}

// Scale SVG to fit container


// Init
phase = 1;
update();
setTimeout(startPlay, 800);

// Keyboard nav
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { stopPlay(); nextPhase(); }
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { stopPlay(); prevPhase(); }
  if (e.key === ' ') { e.preventDefault(); togglePlay(); }
});
</script>
