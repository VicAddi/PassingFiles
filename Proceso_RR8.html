<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #F7F5F2;
    font-family: 'IBM Plex Sans', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    color: #1C1B18;
  }
  header {
    padding: 14px 28px 10px;
    border-bottom: 1px solid #D9D5CE;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .hd-left .eyebrow {
    font-size: 10px;
    color: #9B9690;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    margin-bottom: 2px;
  }
  .hd-left h1 {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  #phaseLabel {
    font-size: 12.5px;
    color: #4A4840;
    margin-top: 3px;
    min-height: 17px;
    max-width: 600px;
  }
  .controls {
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .btn {
    padding: 7px 15px;
    border: 1px solid #D9D5CE;
    background: white;
    border-radius: 3px;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    color: #1C1B18;
    transition: background 0.12s;
    user-select: none;
  }
  .btn:hover { background: #EEECEA; }
  .btn:disabled { opacity: 0.35; cursor: default; }
  .btn.primary { background: #1B4F8A; color: white; border-color: #1B4F8A; }
  .btn.primary:hover { background: #153e6e; }
  .phase-pill {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: #6B6860;
    padding: 4px 10px;
    background: #EEECEA;
    border-radius: 20px;
    min-width: 50px;
    text-align: center;
  }
  .svg-wrap { flex: 1; overflow: hidden; position: relative; background: #F7F5F2; }
  #diagram { width: 100%; height: 100%; display: block; overflow: visible; }

  .node { transition: opacity 0.5s ease, transform 0.5s ease; transform-origin: center; }
  .node.hidden { opacity: 0; transform: scale(0.88); pointer-events: none; }
  .edge { transition: opacity 0.4s ease; }
  .edge.hidden { opacity: 0; }

  #progressBar {
    height: 2px;
    background: #1B4F8A;
    width: 0%;
    transition: width 0.4s ease;
    flex-shrink: 0;
  }
</style>
</head>

<script>
const TOTAL = 9;
let phase = 0;
let playing = false;
let timer = null;

// Step x positions for highlight
const STEP_X = [162, 304, 446, 588, 730, 872, 1014, 1156, 1298];

const LABELS = [
  "P1 — Cumplimiento Regulatorio elabora el calendario anual alineado a fechas límite de la CUSF, DOF y cierres contables internos.",
  "P2 — Actuaría coordina la extracción de datos: Suscripción aporta pólizas/endosos, Siniestros los importes pagados/pendientes, Reaseguro los contratos cedidos. TI ejecuta los ETL desde el DWH.",
  "P3 — TI y Actuaría ejecutan controles de integridad referencial, eliminan duplicados, reclasifican catálogos internos al catálogo CNSF (Anexo 38.1.2) y depuran registros faltantes.",
  "P4 — Actuaría calcula primas devengadas, reservas específicas, triángulos de desarrollo (IBNR), siniestralidad y frecuencia por ramo. Contraloría concilia con RR-7 (estados financieros).",
  "P5 — TI genera los archivos .TXT siguiendo los layouts del SEIVE: campo por campo, tipo, longitud y formato exactos según los Anexos 38.1.9-b a 38.1.9-z de la CUSF.",
  "P6 — Actuaría y Contraloría concilian RR-8 contra RR-1 (corporativo), RR-3 (reservas) y RR-7 (estados financieros) para garantizar el 'dato único' antes del envío.",
  "P7 — El actuario responsable firma el escrito de precisiones (producto ESC, PDF). Alta Dirección y Comité de Auditoría revisan indicadores. Auditoría Interna valida los controles (Cap. 3.3 CUSF).",
  "P8 — TI comprime los archivos .TXT en ZIP, cifra el paquete con la llave pública PGP de la CNSF y lo carga al portal SEIVE (Cap. 39.2 CUSF — información estructurada).",
  "P9 — CNSF emite acuse automático por SEIVE. Si hay errores de formato o catálogos, Cumplimiento atiende observaciones vía Mesa de Ayuda (soporte_MA@cnsf.gob.mx) y reenvía. Los SESA quedan alimentados.",
];

function update() {
  document.querySelectorAll('.node[data-phase], .edge[data-phase]').forEach(el => {
    const p = parseInt(el.dataset.phase);
    el.classList.toggle('hidden', p > phase);
  });
  document.getElementById('phaseLabel').textContent = phase > 0 ? LABELS[phase - 1] : '—';
  document.getElementById('phasePill').textContent = phase + ' / ' + TOTAL;
  document.getElementById('btnPrev').disabled = phase <= 1;
  document.getElementById('btnNext').disabled = phase >= TOTAL;
  document.getElementById('progressBar').style.width = (phase / TOTAL * 100) + '%';

  // Update step highlight
  const hl = document.getElementById('stepHighlight');
  if (phase >= 1 && phase <= 9) {
    hl.setAttribute('x', STEP_X[phase - 1]);
    hl.setAttribute('opacity', '0.06');
  } else {
    hl.setAttribute('opacity', '0');
  }

  const wm = document.getElementById('stepWatermark');
  if (wm) wm.textContent = phase > 0 ? 'P' + phase : '';
}

function nextPhase() {
  if (phase < TOTAL) { phase++; update(); }
  else if (playing) stopPlay();
}
function prevPhase() {
  if (phase > 1) { phase--; update(); }
}
function startPlay() {
  playing = true;
  document.getElementById('btnPlay').textContent = '⏸ Pausar';
  timer = setInterval(() => {
    if (phase >= TOTAL) { stopPlay(); return; }
    nextPhase();
  }, 2800);
}
function stopPlay() {
  playing = false;
  clearInterval(timer);
  document.getElementById('btnPlay').textContent = '▶ Auto';
}
function togglePlay() { playing ? stopPlay() : startPlay(); }



phase = 1;
update();
setTimeout(startPlay, 800);

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { stopPlay(); nextPhase(); }
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { stopPlay(); prevPhase(); }
  if (e.key === ' ') { e.preventDefault(); togglePlay(); }
});
</script>
